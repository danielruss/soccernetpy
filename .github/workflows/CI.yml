name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    env:
      CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            ort_runtime: linux-x64
          - target: aarch64
            ort_runtime: linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Bundle Microsoft ONNX Runtime
        env:
          ORT_VERSION: '1.24.2'
          ORT_RUNTIME: ${{ matrix.ort_runtime }}
          ORT_NUPKG_SHA256: 782564d3d68e87269ea1812cc94710ad06fe014faf093f01a6f89d0bd58719d3
        run: |
          package="$RUNNER_TEMP/microsoft.ml.onnxruntime.${ORT_VERSION}.nupkg"
          curl --fail --location --retry 3 \
            "https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime/${ORT_VERSION}/microsoft.ml.onnxruntime.${ORT_VERSION}.nupkg" \
            --output "$package"
          echo "${ORT_NUPKG_SHA256}  ${package}" | sha256sum --check
          unzip -j "$package" \
            "runtimes/${ORT_RUNTIME}/native/libonnxruntime.so" \
            "runtimes/${ORT_RUNTIME}/native/libonnxruntime_providers_shared.so" \
            LICENSE \
            ThirdPartyNotices.txt \
            -d python/soccernetpy
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: 2_28
      - name: Verify bundled ONNX Runtime
        run: |
          wheel="$(find dist -name '*.whl' -print -quit)"
          unzip -l "$wheel" | grep 'soccernetpy/libonnxruntime.so'
          unzip -l "$wheel" | grep 'soccernetpy/libonnxruntime_providers_shared.so'
      - name: Test import on glibc 2.28
        if: matrix.target == 'x86_64'
        run: |
          docker run --rm \
            --volume "$PWD/dist:/dist:ro" \
            quay.io/pypa/manylinux_2_28_x86_64:latest \
            bash -c "
              /opt/python/cp39-cp39/bin/python -m pip install /dist/*cp39*.whl
              /opt/python/cp39-cp39/bin/python -c 'import ctypes, os; from soccernetpy import soccernet; ctypes.CDLL(os.environ[\"ORT_DYLIB_PATH\"]); print(\"soccernetpy and Microsoft ONNX Runtime loaded successfully\")'
            "
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: ${{ matrix.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    environment: pypi
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
    needs: [linux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Publish to TestPyPI
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        run: >-
          uv publish
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          'dist/*'

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish 'dist/*'
